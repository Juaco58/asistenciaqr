<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR PRO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --wa-color: #25D366;
            --tg-color: #0088cc;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.8);
            text-align: center;
        }

        .app-icon {
            width: 110px; height: 110px; border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px; transition: transform 0.3s ease;
        }

        h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        .tagline { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px; }

        .hero-img {
            width: 100%; max-width: 480px; border-radius: 16px;
            margin-bottom: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .button-group {
            display: flex; gap: 15px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 40px;
        }

        .btn {
            padding: 15px 30px; border-radius: 14px;
            font-weight: 700; text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.3s ease; cursor: pointer; border: none;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .btn-secondary { background: #f1f5f9; color: var(--text-main); border: 1px solid #e2e8f0; }

        .share-section {
            margin-top: 40px; padding: 25px;
            background: rgba(37, 99, 235, 0.05);
            border-radius: 20px; border: 1px dashed var(--primary);
        }

        .share-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }

        .btn-share {
            padding: 10px 18px; border-radius: 10px; text-decoration: none;
            font-weight: 600; font-size: 0.85rem; color: white;
            display: flex; align-items: center; gap: 8px; cursor: pointer; border: none;
        }

        .wa { background-color: var(--wa-color); }
        .tg { background-color: var(--tg-color); }
        .copy-link { background-color: #64748b; }

        .video-section { border-top: 1px solid #e2e8f0; padding-top: 35px; margin-top: 40px; }
        .video-wrapper { border-radius: 18px; overflow: hidden; background: #000; }
        video { display: block; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://juaco58.github.io/asistenciaqr/maskable-icon-512x512.png" alt="Icono" class="app-icon">
    <h1>Asistencia QR</h1>
    <p class="tagline"><b>La herramienta definitiva para acelerar el registro de asistencias a una reunión</b></p>

    <img src="https://juaco58.github.io/asistenciaqr/screenshot-movil.png" alt="Vista Previa" class="hero-img"><br>

    <div class="button-group">
        <a href="https://juaco58.github.io/asistenciaqr/index.html" class="btn btn-main">
            <i class="fa-solid fa-circle-arrow-down"></i> Descargar App
        </a>
        <a href="https://juaco58.github.io/asistenciaqr/Infoasistenciaqr.pdf" class="btn btn-secondary" target="_blank">
            <i class="fa-solid fa-file-pdf"></i> Info Técnica (PDF)
        </a>
    </div>


    <div class="share-section">
        <h4 style="margin: 0; color: var(--primary);">🚀 ¡Ayúdanos a llegar a más vecinos!</h4>
        <div class="share-buttons">
            <a href="https://wa.me/?text=!Mira esta página: https://asistenciaqr-vercel.sigma.app/asistenciaqr/PagOficialDeDescarga.html" target="_blank" class="btn-share wa">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
            <a href="https://t.me/share/url?url=https://asistenciaqr-vercel.sigma.app/PagOficialDeDescarga.html&text=Usa%20esta App para registrar tu asistencia a una reunión" target="_blank" class="btn-share tg">
                <i class="fa-brands fa-telegram"></i> Telegram
            </a>
            <button onclick="copiarEnlace()" class="btn-share copy-link">
                <i class="fa-solid fa-link"></i> <span id="txt-copy"> Copiar Link</span>
            </button>
        </div>
        
            <footer style="text-align: center; font-size: small; padding-top: 20px; color: #718096;">
            © Joaquín Luis Navarro | 2026</b>
        </footer>
    </div>
</div>

<script>
    function copiarEnlace() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            const span = document.getElementById('txt-copy');
            span.innerText = " ¡Copiado!";
            setTimeout(() => { span.innerText = " Copiar Link"; }, 2000);
        });
    }
</script>

</body>
</html>
