<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Nativa</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; background: #d4edda; color: #155724; }
        .input-file { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; width: 100%; }
        .btn-google { display: none; background: #28a745; color: white; border: none; padding: 15px; border-radius: 5px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; box-sizing: border-box; }
        #img-temporal { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Asistencia Nativo</h2>
    
    <div class="status">Sistema Listo</div>

    <div style="margin-top: 15px; text-align: left; margin-bottom: 25px;">
        <label><b>Tu ID de Usuario asignado:</b></label>
        <input type="text" id="user-id" value="USR-001" style="width:95%; padding:8px; margin-top:5px;">
    </div>

    <div style="text-align: left; margin-bottom: 10px;"><label><b>Sacá o seleccioná la foto del QR:</b></label></div>
    <input type="file" accept="image/*" id="qr-file-input" class="input-file">
    
    <div id="resultado" style="margin-top:20px; font-weight:bold; color:#333; padding: 10px; font-size: 16px;"></div>

    <!-- Modificado a un Botón de acción real controlado por JavaScript -->
    <button id="boton-confirmar" class="btn-google" onclick="redirigirAGoogle()">2. CONFIRMAR PRESENTE 🚀</button>
</div>

<img id="img-temporal">

<script>
    // Variable global para guardar la ruta una vez detectada
    let urlGlobalPrellenada = "";

    if (!('BarcodeDetector' in window)) {
        alert("Aviso: Tu navegador usará el procesador estándar para decodificar la imagen.");
    }

    document.getElementById('qr-file-input').addEventListener('change', function(e) {
        const archivos = e.target.files;
        if (archivos.length === 0) return;

        document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Analizando QR de forma nativa...</span>";
        document.getElementById('boton-confirmar').style.display = "none";

        const fotoSeleccionada = archivos[0]; 
        const lectorArchivo = new FileReader();

        lectorArchivo.onload = function(eventoUrl) {
            const imagenInvisble = document.getElementById('img-temporal');
            
            imagenInvisble.onload = async function() {
                try {
                    const detector = new BarcodeDetector({ formats: ['qr_code'] });
                    const simbolosDetectados = await detector.detect(imagenInvisble);

                    if (simbolosDetectados.length > 0) {
                        const textoQR = simbolosDetectados[0].rawValue;
                        const usuarioId = document.getElementById('user-id').value;

                        document.getElementById('resultado').innerHTML = `
                            <div style="background:#fff3cd; color:#856404; padding:15px; border-radius:5px; border: 1px solid #ffeeba;">
                                <b>¡QR Detectado con éxito!</b><br>
                                Reunión: Código Reconocido
                            </div>
                        `;

                        // Armamos la dirección prellenada de forma clásica
                        urlGlobalPrellenada = "https://google.com";
                        urlGlobalPrellenada += "&entry.2133752850=" + encodeURIComponent(usuarioId);
                        urlGlobalPrellenada += "&entry.1601257763=" + encodeURIComponent(textoQR);

                        // Hacemos visible el botón
                        document.getElementById('boton-confirmar').style.display = "block";

                    } else {
                        document.getElementById('resultado').innerHTML = `
                            <span style="color:red;">❌ No se encontró ningún QR en la foto.</span><br>
                            <small style="color:#666;">Intentá enfocar el código más de cerca y derecho.</small>
                        `;
                    }
                } catch (err) {
                    document.getElementById('resultado').innerHTML = "<span style='color:red;'>❌ Error al leer los píxeles del QR.</span>";
                    console.error(err);
                }
            };
            imagenInvisble.src = eventoUrl.target.result;
        };
        lectorArchivo.readAsDataURL(fotoSeleccionada);
    });

    function redirigirAGoogle() {
        if (urlGlobalPrellenada !== "") {
            // Redirección directa en la misma pestaña para saltar el bloqueo de Google
            window.location.href = urlGlobalPrellenada;
        }
    }
</script>

</body>
</html>
