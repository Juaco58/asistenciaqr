<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Infalible</title>
    <!-- Librería para escanear QR -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-live { background: #007bff; color: white; border: none; padding: 14px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-photo { background: #28a745; color: white; border: none; padding: 14px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        #reader { width: 100%; margin-top: 15px; border-radius: 8px; overflow: hidden; background: #222; min-height: 50px; }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Asistencia</h2>
    
    <div id="connection-status" class="status online">Conectado a Internet</div>

    <div style="margin-top: 15px; text-align: left;">
        <label><b>Tu ID de Usuario asignado:</b></label>
        <input type="text" id="user-id" value="USR-001" style="width:95%; padding:8px; margin-top:5px;">
    </div>

    <!-- Opción 1: Captura de Foto Nativa (MÉTODO SEGURO) -->
    <div class="file-input-wrapper">
        <button class="btn-photo">📷 Sacar Foto al QR del Papel</button>
        <input type="file" accept="image/*" capture="environment" id="qr-file-input">
    </div>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #ccc;">

    <!-- Opción 2: Escáner en vivo (Si el navegador lo permite) -->
    <button class="btn-live" onclick="iniciarEscaneoEnVivo()">🎥 Probar Cámara en Vivo</button>
    <div id="reader"></div>
    
    <div id="resultado" style="margin-top:20px; font-weight:bold; color:#333; padding: 10px;"></div>
</div>

<script>
    // --- CONTROL DE RED ---
    const statusDiv = document.getElementById('connection-status');
    function actualizarEstadoRed() {
        if (navigator.onLine) {
            statusDiv.textContent = "Conectado a Internet";
            statusDiv.className = "status online";
            sincronizarPendientes();
        } else {
            statusDiv.textContent = "Modo Offline (Sin Internet)";
            statusDiv.className = "status offline";
        }
    }
    window.addEventListener('online', actualizarEstadoRed);
    window.addEventListener('offline', actualizarEstadoRed);
    actualizarEstadoRed();

    // --- MÉTODO 1: PROCESAR QR DESDE FOTO (INCORRUPTIBLE) ---
    const fileInput = document.getElementById('qr-file-input');
    const html5QrCodeParser = new Html5Qrcode("reader");

    fileInput.addEventListener('change', e => {
        if (e.target.files.length == 0) return;
        
        document.getElementById('resultado').innerText = "Procesando imagen...";
        const imageFile = e.target.files[0];
        
        // La librería lee el archivo de imagen directamente sin encender transmisiones de video
        html5QrCodeParser.scanFile(imageFile, true)
            .then(decodedText => {
                const usuarioId = document.getElementById('user-id').value;
                procesarAsistencia(usuarioId, decodedText);
            })
            .catch(err => {
                document.getElementById('resultado').innerHTML = `<span style="color:red;">No se detectó un QR claro en la foto. Volvé a intentar enfocando bien el papel.</span>`;
                console.error(err);
            });
    });

    // --- MÉTODO 2: ESCÁNER EN VIVO (OPCIONAL) ---
    let html5QrcodeLive;
    function iniciarEscaneoEnVivo() {
        document.getElementById('resultado').innerText = "Iniciando stream de video...";
        if (html5QrcodeLive) { html5QrcodeLive.stop().catch(()=>{}); }
        
        html5QrcodeLive = new Html5Qrcode("reader", { useBarCodeDetectorIfSupported: false });
        html5QrcodeLive.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (text) => {
                html5QrcodeLive.stop();
                procesarAsistencia(document.getElementById('user-id').value, text);
            },
            () => {}
        ).catch(err => {
            document.getElementById('resultado').innerHTML = `<span style="color:red;">Tu navegador bloqueó la cámara en vivo. Usá el botón verde de arriba.</span>`;
        });
    }

    // --- PROCESAMIENTO GENERAL ---
    function procesarAsistencia(usuario, reunion) {
        const registro = {
            usuario_id: usuario,
            reunion_id: reunion,
            fecha_escaneo: new Date().toISOString()
        };

        if (navigator.onLine) {
            enviarAlServidor(registro);
        } else {
            guardarEnLocal(registro);
        }
    }

    function enviarAlServidor(datos) {
        document.getElementById('resultado').innerHTML = `
            <div style="background:#d4edda; color:green; padding:10px; border-radius:5px;">
                ¡Presente Validado!<br>
                <b>Reunión:</b> ${datos.reunion_id}
            </div>
        `;
    }

    function guardarEnLocal(datos) {
        let pendientes = JSON.parse(localStorage.getItem('asistencias_pendientes')) || [];
        pendientes.push(datos);
        localStorage.setItem('asistencias_pendientes', JSON.stringify(pendientes));

        document.getElementById('resultado').innerHTML = `
            <div style="background:#fff3cd; color:orange; padding:10px; border-radius:5px;">
                Guardado en Memoria (Offline)<br>
                Se subirá cuando recuperes internet.
            </div>
        `;
    }

    function sincronizarPendientes() {
        let pendientes = JSON.parse(localStorage.getItem('asistencias_pendientes')) || [];
        if (pendientes.length > 0) {
            pendientes.forEach(reg => enviarAlServidor(reg));
            localStorage.removeItem('asistencias_pendientes');
            alert("¡Se sincronizaron los presentes guardados offline con éxito!");
        }
    }
</script>

</body>
</html>
