<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Conectada</title>
    <!-- Incluimos la librería oficial de Supabase para JavaScript -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; background: #d4edda; color: #155724; }
        .input-file { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Asistencia Real</h2>
    
    <div class="status">Conectado a la Nube</div>

    <div style="margin-top: 15px; text-align: left; margin-bottom: 25px;">
        <label><b>Tu ID de Usuario asignado:</b></label>
        <input type="text" id="user-id" value="USR-001" style="width:95%; padding:8px; margin-top:5px;">
    </div>

    <div style="text-align: left; margin-bottom: 10px;"><label><b>Sacá o seleccioná la foto del QR:</b></label></div>
    <input type="file" accept="image/*" id="qr-file-input" class="input-file">
    
    <div id="resultado" style="margin-top:20px; font-weight:bold; color:#333; padding: 10px; font-size: 16px;"></div>
</div>

<script>
    // ==========================================
    // CONFIGURACIÓN DE TU CUENTA SUPABASE
    // (Reemplazá estos datos con los tuyos de la pestaña Settings -> API de Supabase)
    // ==========================================
    const SUPABASE_URL = "https://ijyygmfieleqqtvvryfu.supabase.co/rest/v1/";
    const SUPABASE_ANON_KEY = "TejasDelSur&2026";
    
    // Inicializamos la conexión con la nube
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('qr-file-input').addEventListener('change', async function(e) {
        const archivos = e.target.files;
        if (archivos.length === 0) return;

        document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Procesando y subiendo a la base de datos...</span>";

        const archivoImagen = archivos;

        try {
            const bitmap = await createImageBitmap(archivoImagen);
            const detector = new BarcodeDetector({ formats: ['qr_code'] });
            const simbolosDetectados = await detector.detect(bitmap);

            if (simbolosDetectados.length > 0) {
                const textoQR = simbolosDetectados.rawValue;
                const usuarioId = document.getElementById('user-id').value;

                // 🚀 ENVIAR LOS DATOS A SUPABASE EN TIEMPO REAL
                const { data, error } = await supabase
                    .from('asistencias')
                    .insert([
                        { usuario_id: usuarioId, reunion_id: textoQR }
                    ]);

                if (error) {
                    throw error;
                }

                document.getElementById('resultado').innerHTML = `
                    <div style="background:#d4edda; color:green; padding:15px; border-radius:5px; border: 1px solid #c3e6cb;">
                        <b>¡Presente Guardado en la Nube!</b><br>
                        Usuario: ${usuarioId}<br>
                        Reunión: ${textoQR}
                    </div>
                `;
            } else {
                document.getElementById('resultado').innerHTML = `<span style="color:red;">❌ No se encontró ningún QR en la foto.</span>`;
            }
        } catch (err) {
            document.getElementById('resultado').innerHTML = `<span style="color:red;">Error de conexión: ${err.message || err}</span>`;
            console.error(err);
        }
    });
</script>

</body>
</html>
