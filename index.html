<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Directa</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; background: #d4edda; color: #155724; }
        .btn-abrir { background: #007bff; color: white; border: none; padding: 16px 20px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; text-decoration: none; display: inline-block; box-sizing: border-box; margin-top: 15px; }
        .instrucciones { text-align: left; background: #eee; padding: 12px; border-radius: 5px; margin-top: 20px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Asistencia Directo</h2>
    
    <div class="status">Sistema Listo</div>

    <div style="margin-top: 15px; text-align: left; margin-bottom: 25px;">
        <label><b>Tu ID de Usuario asignado:</b></label>
        <input type="text" id="user-id" value="USR-001" style="width:95%; padding:8px; margin-top:5px;">
    </div>

    <!-- Botón nativo puro que el celular no puede bloquear bajo ningún concepto -->
    <button class="btn-abrir" onclick="registrarAsistencia()">REGISTRAR ASISTENCIA 🚀</button>
    
    <div class="instrucciones">
        <b>💡 ¿Cómo funciona?</b><br>
        Al tocar el botón azul, la app te llevará directo a tu hoja de asistencia oficial de Google Forms para que envíes tu presente de forma segura [1.35].
    </div>
</div>

<script>
    function registrarAsistencia() {
        const usuarioId = document.getElementById('user-id').value;
        
        // Coordenadas de tu formulario real de Google Forms
        const ID_FORMULARIO = "1FAIpQLSfo3_nlRPwOmoM2kCbIw9VP5TQHm7jK8taAZdILR1JLN6XURg"; 
        const NUMERO_CAMPO_USUARIO = "2133752850";         
        const NUMERO_CAMPO_REUNION = "1601257763";         
        
        // El QR que leyeron contiene este enlace fijo de reunión
        const enlaceReunion = "https://me-qr.com";

        // Armamos la dirección oficial prellenada exacta
        const urlFinal = "https://google.com" + ID_FORMULARIO + "/viewform?usp=pp_url" +
                         "&entry." + NUMERO_CAMPO_USUARIO + "=" + encodeURIComponent(usuarioId) +
                         "&entry." + NUMERO_CAMPO_REUNION + "=" + encodeURIComponent(enlaceReunion);

        // Redirigimos al usuario inmediatamente de forma oficial
        window.location.href = urlFinal;
    }
</script>

</body>
</html>
