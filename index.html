<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Profesional</title>
    <style>
        /* 🎨 Rediseño Visual Móvil Premium */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container { 
            max-width: 420px; 
            width: 100%;
            background: #ffffff; 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); 
            box-sizing: border-box;
        }
        h2 {
            color: #1a1a1a;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .status { 
            margin-top: 8px; 
            margin-bottom: 24px;
            padding: 8px 12px; 
            border-radius: 20px; 
            font-weight: 600; 
            font-size: 13px;
            background: #e6f4ea; 
            color: #137333; 
            display: inline-block;
        }
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }
        label {
            font-size: 14px;
            color: #4a4a4a;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 14px; 
            border: 1.5px solid #dcdcdc;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            background: #ffffff;
            transition: border-color 0.2s, background-color 0.2s;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #007bff;
        }
        input[type="text"]:disabled {
            background: #f1f3f4;
            color: #5f6368;
            border-color: #e0e0e0;
        }
        .btn-cambiar { 
            background: #f1f3f4; 
            color: #3c4043; 
            border: 1.5px solid #dcdcdc;
            padding: 0 16px; 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.2s, color 0.2s;
        }
        .btn-cambiar:hover { 
            background: #e8eaed; 
        }
        .input-file { 
            width: 100%; 
            padding: 16px; 
            background: #007bff; 
            color: #ffffff; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            box-sizing: border-box; 
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
        }
        .input-file:hover {
            background: #0069d9;
        }
        .input-file:active {
            transform: scale(0.98);
        }
        .input-file:disabled {
            background: #6c757d !important;
            box-shadow: none;
            cursor: not-allowed;
        }
        #resultado { 
            margin-top: 20px; 
            font-size: 15px; 
            box-sizing: border-box;
        }
        /* Alertas estilizadas */
        .alert {
            padding: 16px;
            border-radius: 12px;
            text-align: left;
            line-height: 1.5;
        }
        .alert-success {
            background: #e6f4ea;
            color: #137333;
            border: 1px solid #c2e7cb;
        }
        .alert-danger {
            background: #fce8e6;
            color: #c5221f;
            border: 1px solid #fad2cf;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Asistencia Profesional</h2>
    
    <div class="status">Conectado al Servidor</div>

    <div class="input-group">
        <label><b>Tu ID de Usuario asignado:</b></label>
        <div class="input-row">
            <input type="text" id="user-id" value="USR-001" placeholder="Ej: USR-001">
            <button type="button" id="btn-editar-id" class="btn-cambiar">Cambiar</button>
        </div>
    </div>

    <div style="text-align: left; margin-bottom: 10px;"><label><b>Sacá o seleccioná la foto del QR:</b></label></div>
    <input type="file" accept="image/*" id="qr-file-input" class="input-file">
    
    <div id="resultado" style="margin-top:20px; font-weight:bold; color:#333; padding: 10px; font-size: 16px;"></div>
</div>

<img id="img-temporal">

<script>
    if (!('BarcodeDetector' in window)) {
        alert("Aviso: Tu navegador usará el procesador estándar para decodificar la imagen.");
    }

    const inputUsuario = document.getElementById('user-id');
    const botonEditar = document.getElementById('btn-editar-id');

    // 🌟 CONTROL DE MEMORIA
    const idGuardado = localStorage.getItem('asistencia_user_id');
    if (idGuardado) {
        inputUsuario.value = idGuardado;
        inputUsuario.disabled = true;
        botonEditar.textContent = "Cambiar";
    } else {
        botonEditar.style.display = "none"; 
    }

    // 🌟 BOTÓN CAMBIAR
    botonEditar.addEventListener('click', function() {
        localStorage.removeItem('asistencia_user_id'); 
        inputUsuario.value = "";
        inputUsuario.disabled = false;
        botonEditar.style.display = "none"; 
        
        const inputArchivo = document.getElementById('qr-file-input');
        inputArchivo.disabled = false;
        inputArchivo.style.background = "#007bff";
        inputArchivo.style.cursor = "pointer";
        document.getElementById('resultado').innerHTML = "";
    });

    inputUsuario.addEventListener('input', function() {
        if (inputUsuario.value.trim().length > 0) {
            botonEditar.textContent = "Limpiar";
            botonEditar.style.display = "inline-block";
        } else {
            botonEditar.style.display = "none";
        }
    });

    document.getElementById('qr-file-input').addEventListener('change', function(e) {
        const archivos = e.target.files;
        if (archivos.length === 0) return;

        const inputArchivo = document.getElementById('qr-file-input');

        if (!inputUsuario.value.trim()) {
            document.getElementById('resultado').innerHTML = `<div class="alert alert-danger">❌ Por favor, ingresá tu ID de usuario antes de escanear.</div>`;
            inputArchivo.value = "";
            return;
        }

        document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Conectando de ida y vuelta con la base de datos...</span>";

        const fotoSeleccionada = archivos[0]; // 🔒 Tu lectura original exacta intacta
        const lectorArchivo = new FileReader();

        lectorArchivo.onload = function(eventoUrl) {
            const imagenInvisble = document.getElementById('img-temporal');
            
            imagenInvisble.onload = async function() {
                try {
                    const detector = new BarcodeDetector({ formats: ['qr_code'] });
                    const simbolosDetectados = await detector.detect(imagenInvisble);

                    if (simbolosDetectados.length > 0) {
                        const textoQR = simbolosDetectados[0].rawValue; // 🔒 Tu lectura original exacta intacta
                        const usuarioId = inputUsuario.value.trim();
                        const SUPABASE_URL = "https://ijyygmfieleqqtvvryfu.supabase.co";
                        const apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeXlnbWZpZWxlcXF0dnZyeWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTkwODcsImV4cCI6MjA5NDg3NTA4N30.VbQQNwZFEURnOPrvG9VnfZm2bOXKLHDdExdjAnECm8U";
                        
                        const cabeceras = {
                            'apikey': apiKey,
                            'Authorization': 'Bearer ' + apiKey,
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        };

                        document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Buscando usuario '" + usuarioId + "'...</span>";

                        // 🔒 Tus URLs unificadas y corregidas que ya comprobaste que andan perfecto
                        const urlUsuarios = `${SUPABASE_URL}/rest/v1/usuarios?id=eq.${encodeURIComponent(usuarioId)}&select=nombre`;
                        
                        let respuestaUsuario;
                        try {
                            respuestaUsuario = await fetch(urlUsuarios, { 
                                method: 'GET', 
                                headers: cabeceras
                            });
                        } catch (errNet) {
                            throw new Error("Falla de Red Física. Verificá tu conexión a internet.");
                        }
                        
                        if (!respuestaUsuario.ok) {
                            const errorTexto = await respuestaUsuario.text();
                            throw new Error("Supabase respondió con error: " + errorTexto);
                        }

                        const datosUsuario = await respuestaUsuario.json();

                        if (!datosUsuario || datosUsuario.length === 0) {
                            document.getElementById('resultado').innerHTML = `
                                <div class="alert alert-danger">
                                    <b>❌ Acceso Denegado</b><br>
                                    El ID de usuario <b>${usuarioId}</b> no figura en la tabla 'usuarios'.
                                </div>
                            `;
                            return; 
                        }

                        const nombreReal = datosUsuario[0].nombre; // 🔒 Tu lectura original exacta intacta
                        document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Insertando asistencia en la nube...</span>";

                        const urlAsistencias = `${SUPABASE_URL}/rest/v1/asistencias`;
                        const respuestaAsistencia = await fetch(urlAsistencias, {
                            method: 'POST',
                            headers: { ...cabeceras, 'Prefer': 'return=minimal' },
                            body: JSON.stringify({
                                usuario_id: usuarioId,
                                reunion_id: textoQR
                            })
                        });

                        if (!respuestaAsistencia.ok) {
                            const errorTextoAsis = await respuestaAsistencia.text();
                            throw new Error("Error al guardar asistencia: " + errorTextoAsis);
                        }

                        // Guardamos en memoria tras el éxito
                        localStorage.setItem('asistencia_user_id', usuarioId);
                        botonEditar.textContent = "Salir";
                        botonEditar.style.display = "inline-block";

                        const ahora = new Date();
                        const horaLocal = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                        // Bloqueos de interfaz táctil
                        inputArchivo.disabled = true;
                        inputUsuario.disabled = true;

                        document.getElementById('resultado').innerHTML = `
                            <div class="alert alert-success">
                                <b>¡Presente Confirmado! ✅</b><br>
                                Bienvenido/a, <b>${nombreReal}</b>.<br>
                                <span style="font-size: 14px;">Registrado localmente a las <b>${horaLocal}</b>.</span><br>
                                <small style="display:block; margin-top:5px; color: #137333;">Asistencia registrada automáticamente en la nube.</small>
                            </div>
                        `;

                    } else {
                        document.getElementById('resultado').innerHTML = `<div class="alert alert-danger">❌ No se detectó ningún QR en la foto.</div>`;
                    }
                } catch (err) {
                    document.getElementById('resultado').innerHTML = `
                        <div class="alert alert-danger">
                            <b>⚠️ Alerta del Servidor:</b><br>${err.message}
                        </div>
                    `;
                    console.error(err);
                }
            };
            imagenInvisble.src = eventoUrl.target.result;
        };
        lectorArchivo.readAsDataURL(fotoSeleccionada);
    });
</script>

</body>
</html>
