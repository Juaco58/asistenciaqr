<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Nativa</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; background: #d4edda; color: #155724; }
        .input-file { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
        .btn-confirmar { background: #28a745; color: white; border: none; padding: 15px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<!-- Formulario invisible configurado correctamente -->
<form id="google-form" action="" method="POST" target="hidden_iframe" onsubmit="mostrarExito()">
    <input type="hidden" id="entry-usuario" name="">
    <input type="hidden" id="entry-reunion" name="">
    <!-- El botón oculto real que usará JavaScript para no romper el envío -->
    <input type="submit" id="submit-real-oculto" style="display: none;">
</form>

<!-- Iframe oculto para retener la respuesta en segundo plano -->
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<div class="container">
    <h2>Control de Asistencia Nativo</h2>
    
    <div class="status">Sistema Listo</div>

    <div style="margin-top: 15px; text-align: left; margin-bottom: 25px;">
        <label><b>Tu ID de Usuario asignado:</b></label>
        <input type="text" id="user-id" value="USR-001" style="width:95%; padding:8px; margin-top:5px;">
    </div>

    <div style="text-align: left; margin-bottom: 10px;"><label><b>Paso 1: Seleccioná la foto del QR</b></label></div>
    <input type="file" accept="image/*" id="qr-file-input" class="input-file">
    
    <div id="resultado" style="margin-top:20px; font-weight:bold; color:#333; padding: 10px; font-size: 16px;"></div>

    <!-- Botón visual que toca el usuario -->
    <button id="btn-confirmar" class="btn-confirmar" onclick="enviarAGoogle()">Paso 2: Confirmar Presente 🚀</button>
</div>

<script>
    // =======================================================
    // CONFIGURACIÓN DE TU GOOGLE FORM (Reemplazá con tus datos reales)
    // =======================================================
    const ID_FORMULARIO = "1FAIpQLSfXXXXXXXXXXXXX"; // Código largo de tu formulario
    const NUMERO_CAMPO_USUARIO = "111111";         // Número de la pregunta 'usuario'
    const NUMERO_CAMPO_REUNION = "222222";         // Número de la pregunta 'reunion'

    // Armamos la estructura de los campos
    const formHtml = document.getElementById('google-form');
    formHtml.action = `https://google.com{ID_FORMULARIO}/formResponse`;
    document.getElementById('entry-usuario').name = `entry.${NUMERO_CAMPO_USUARIO}`;
    document.getElementById('entry-reunion').name = `entry.${NUMERO_CAMPO_REUNION}`;

    if (!('BarcodeDetector' in window)) {
        alert("Aviso: Tu navegador usará el procesador estándar para decodificar la imagen.");
    }

    document.getElementById('qr-file-input').addEventListener('change', async function(e) {
        const archivos = e.target.files;
        if (archivos.length === 0) return;

        document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Analizando QR de forma nativa...</span>";
        document.getElementById('btn-confirmar').style.display = "none";

        try {
            const bitmap = await createImageBitmap(archivos); 
            const detector = new BarcodeDetector({ formats: ['qr_code'] });
            const simbolosDetectados = await detector.detect(bitmap);

            if (simbolosDetectados.length > 0) {
                const textoQR = simbolosDetectados.rawValue;
                const usuarioId = document.getElementById('user-id').value;

                // Cargamos los datos leídos
                document.getElementById('entry-usuario').value = usuarioId;
                document.getElementById('entry-reunion').value = textoQR;

                document.getElementById('resultado').innerHTML = `
                    <div style="background:#fff3cd; color:#856404; padding:10px; border-radius:5px;">
                        <b>¡QR Detectado con éxito!</b><br>
                        Reunión: ${textoQR}
                    </div>
                `;
                
                document.getElementById('btn-confirmar').style.display = "block";

            } else {
                document.getElementById('resultado').innerHTML = `<span style="color:red;">❌ No se encontró ningún QR en la foto.</span>`;
            }
        } catch (err) {
            document.getElementById('resultado').innerHTML = "<span style='color:#721c24;'>❌ Error al procesar imagen.</span>";
            console.error(err);
        }
    });

    function enviarAGoogle() {
        // CORRECCIÓN CLAVE: Simulamos el clic real del elemento submit para no romper el iframe
        document.getElementById('submit-real-oculto').click(); [1.35]
    }

    function mostrarExito() {
        document.getElementById('btn-confirmar').style.display = "none";
        document.getElementById('resultado').innerHTML = `
            <div style="background:#d4edda; color:green; padding:15px; border-radius:5px; border: 1px solid #c3e6cb;">
                <b>¡Presente Guardado con éxito!</b><br>
                Los datos ya impactaron en la lista de presentes.
            </div>
        `;
    }
</script>

</body>
</html>
