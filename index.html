<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Directa</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; background: #d4edda; color: #155724; margin-bottom: 20px; }
        .btn-confirmar { background: #28a745; color: white; border: none; padding: 16px 20px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        input[type="text"] { width: 95%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Asistencia Directo</h2>
    
    <div class="status">Sistema Listo</div>

    <!-- Formulario nativo puro que el celular no puede bloquear bajo ningún concepto -->
    <form action="https://google.com" method="GET" target="_blank">
        
        <!-- Parámetro oculto para avisar a Google que va con datos prellenados -->
        <input type="hidden" name="usp" value="pp_url">

        <div style="text-align: left;">
            <label><b>1. Escribí tu ID de Usuario:</b></label>
            <input type="text" name="entry.2133752850" value="USR-001" required>
        </div>

        <div style="text-align: left;">
            <label><b>2. Copiá o escribí el código del QR:</b></label>
            <input type="text" name="entry.1601257763" value="https://me-qr.com" required>
        </div>

        <!-- Botón de envío estándar de HTML -->
        <button type="submit" class="btn-confirmar">CONFIRMAR PRESENTE 🚀</button>
    </form>
</div>

</body>
</html>
