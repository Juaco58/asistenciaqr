<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Nativa</title>
    <!-- Cargamos el conector oficial de Supabase aprobado para navegadores web -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; background: #d4edda; color: #155724; }
        .input-file { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Asistencia Nativo</h2>
    
    <div class="status">Sistema Listo</div>

    <div style="margin-top: 15px; text-align: left; margin-bottom: 25px;">
        <label><b>Tu ID de Usuario asignado:</b></label>
        <input type="text" id="user-id" value="USR-001" style="width:95%; padding:8px; margin-top:5px;">
    </div>

    <div style="text-align: left; margin-bottom: 10px;"><label><b>Sacá o seleccioná la foto del QR:</b></label></div>
    
    <input type="file" accept="image/*" id="qr-file-input" class="input-file">
    
    <div id="resultado" style="margin-top:20px; font-weight:bold; color:#333; padding: 10px; font-size: 16px;"></div>
</div>

<script>
    if (!('BarcodeDetector' in window)) {
        alert("Aviso: Tu navegador usará el procesador estándar para decodificar la imagen.");
    }

    // Inicializamos la conexión segura mediante la librería oficial
    const SUPABASE_URL = "https://ijyygmfieleqqtvvryfu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqeXlnbWZpZWxlcXF0dnZyeWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTkwODcsImV4cCI6MjA5NDg3NTA4N30.VbQQNwZFEURnOPrvG9VnfZm2bOXKLHDdExdjAnECm8U";
    const supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('qr-file-input').addEventListener('change', async function(e) {
        const archivos = e.target.files;
        if (archivos.length === 0) return;

        document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Analizando QR de forma nativa...</span>";

        const archivoImagen = archivos[0];

        try {
            const bitmap = await createImageBitmap(archivoImagen);
            const detector = new BarcodeDetector({ formats: ['qr_code'] });
            const simbolosDetectados = await detector.detect(bitmap);

            if (simbolosDetectados.length > 0) {
                const textoQR = simbolosDetectados[0].rawValue;
                const usuarioId = document.getElementById('user-id').value;

                document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Verificando credenciales en el servidor...</span>";

                // 🔍 PASO 1: VALIDAR SI EL USUARIO EXISTE
                const { data: datosUsuario, error: errorBusqueda } = await supabaseClient
                    .from('usuarios')
                    .select('nombre')
                    .eq('id', usuarioId);

                // Manejo de errores de conexión o columnas incorrectas
                if (errorBusqueda) {
                    throw new Error("Error al consultar la tabla usuarios: " + errorBusqueda.message);
                }

                if (!datosUsuario || datosUsuario.length === 0) {
                    document.getElementById('resultado').innerHTML = `
                        <div style="background:#f8d7da; color:#721c24; padding:15px; border-radius:5px; border: 1px solid #f5c6cb;">
                            <b>❌ Acceso Denegado</b><br>
                            El ID de usuario <b>${usuarioId}</b> no figura en el listado.
                        </div>
                    `;
                    return; 
                }

                // El usuario existe, procedemos a guardar el presente
                const nombreReal = datosUsuario[0].nombre;
                document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Registrando asistencia en la nube...</span>";

                // 🚀 PASO 2: GUARDAR EL PRESENTE EN LA TABLA 'asistencias'
                const { error: errorAsistencia } = await supabaseClient
                    .from('asistencias')
                    .insert([
                        { usuario_id: usuarioId, reunion_id: textoQR }
                    ]);

                if (errorAsistencia) {
                    throw new Error("Error al escribir en la tabla asistencias: " + errorAsistencia.message);
                }

                document.getElementById('resultado').innerHTML = `
                    <div style="background:#d4edda; color:green; padding:15px; border-radius:5px; border: 1px solid #c3e6cb;">
                        <b>¡Presente Confirmado!</b><br>
                        Bienvenido/a: <b>${nombreReal}</b><br>
                        Reunión registrada: ${textoQR}
                    </div>
                `;
            } else {
                document.getElementById('resultado').innerHTML = `
                    <span style="color:red;">❌ No se encontró ningún QR en la foto.</span><br>
                    <small style="color:#666;">Intentá enfocar el código más de cerca y sin reflejos de luz.</small>
                `;
            }
        } catch (err) {
            // Si hay un error de columnas o de base de datos, el servidor te va a decir la causa exacta en la pantalla
            document.getElementById('resultado').innerHTML = `<span style="color:red; text-align:left; display:block;">⚠️ Detalle Técnico: ${err.message || err}</span>`;
            console.error(err);
        }
    });
</script>

</body>
</html>
