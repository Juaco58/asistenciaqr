<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR Nativa</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; background: #d4edda; color: #155724; }
        .input-file { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box; }
        .btn-google { display: none; background: #28a745; color: white; text-decoration: none; padding: 15px; border-radius: 5px; font-size: 18px; font-weight: bold; margin-top: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Asistencia Nativo</h2>
    
    <div class="status">Sistema Listo</div>

    <div style="margin-top: 15px; text-align: left; margin-bottom: 25px;">
        <label><b>Tu ID de Usuario asignado:</b></label>
        <input type="text" id="user-id" value="USR-001" style="width:95%; padding:8px; margin-top:5px;">
    </div>

    <div style="text-align: left; margin-bottom: 10px;"><label><b>Sacá o seleccioná la foto del QR:</b></label></div>
    
    <!-- Este es tu input original que funcionaba bien -->
    <input type="file" accept="image/*" id="qr-file-input" class="input-file">
    
    <div id="resultado" style="margin-top:20px; font-weight:bold; color:#333; padding: 10px; font-size: 16px;"></div>

    <!-- Botón verde que aparecerá al detectar el QR -->
    <a id="boton-confirmar" class="btn-google" target="_blank">2. CONFIRMAR PRESENTE 🚀</a>
</div>

<script>
    if (!('BarcodeDetector' in window)) {
        alert("Aviso: Tu navegador usará el procesador estándar para decodificar la imagen.");
    }

    document.getElementById('qr-file-input').addEventListener('change', async function(e) {
        const archivos = e.target.files;
        if (archivos.length === 0) return;

        document.getElementById('resultado').innerHTML = "<span style='color:#007bff;'>⏳ Analizando QR de forma nativa...</span>";
        document.getElementById('boton-confirmar').style.display = "none";

        // Tu lógica exacta de lectura individual de archivos
        const archivoImagen = archivos[0]; 

        try {
            const bitmap = await createImageBitmap(archivoImagen);
            const detector = new BarcodeDetector({ formats: ['qr_code'] });
            const simbolosDetectados = await detector.detect(bitmap);

            if (simbolosDetectados.length > 0) {
                const textoQR = simbolosDetectados[0].rawValue; // Lee el link del QR
                const usuarioId = document.getElementById('user-id').value; // Lee el ID de la app

                // Tus coordenadas reales de Google Forms
                const ID_FORMULARIO = "1FAIpQLSfo3_nlRPwOmoM2kCbIw9VP5TQHm7jK8taAZdILR1JLN6XURg"; 
                const CAMPO_USUARIO = "2133752850";         
                const CAMPO_REUNION = "1601257763";         

                // Armamos el enlace prellenado oficial
                const urlGooglePrellenada = `https://google.com{ID_FORMULARIO}/viewform?usp=pp_url&entry.${CAMPO_USUARIO}=${encodeURIComponent(usuarioId)}&entry.${CAMPO_REUNION}=${encodeURIComponent(textoQR)}`;

                // Ponemos la pantalla en amarillo avisando el éxito (Como te funcionaba antes)
                document.getElementById('resultado').innerHTML = `
                    <div style="background:#fff3cd; color:#856404; padding:15px; border-radius:5px; border: 1px solid #ffeeba;">
                        <b>¡QR Detectado con éxito!</b><br>
                        Reunión: ${textoQR}
                    </div>
                `;

                // Activamos el botón verde oficial con el enlace listo
                const boton = document.getElementById('boton-confirmar');
                boton.href = urlGooglePrellenada;
                boton.style.display = "block";

            } else {
                document.getElementById('resultado').innerHTML = `
                    <span style="color:red;">❌ No se encontró ningún QR en la foto.</span><br>
                    <small style="color:#666;">Intentá enfocar el código más de cerca y sin reflejos de luz.</small>
                `;
            }
        } catch (err) {
            document.getElementById('resultado').innerHTML = `<span style="color:red;">Error de compatibilidad al abrir el archivo.</span>`;
            console.error(err);
        }
    });
</script>

</body>
</html>
